<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Conversaciones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .bg-particles span {
            position: absolute;
            width: 6px; height: 6px;
            background: rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            animation: float-up linear infinite;
        }
        .bg-particles span:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; }
        .bg-particles span:nth-child(2) { left: 25%; animation-duration: 12s; animation-delay: 2s; }
        .bg-particles span:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 1s; }
        .bg-particles span:nth-child(4) { left: 55%; animation-duration: 9s; animation-delay: 3s; }
        .bg-particles span:nth-child(5) { left: 70%; animation-duration: 11s; animation-delay: 0.5s; }
        .bg-particles span:nth-child(6) { left: 85%; animation-duration: 7s; animation-delay: 1.5s; }

        @keyframes float-up {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 36px;
            animation: slideDown 0.6s ease-out;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Search bar */
        .search-wrapper {
            position: relative;
            margin-bottom: 32px;
            animation: fadeIn 0.8s ease-out;
        }
        .search-wrapper form {
            display: flex;
            gap: 10px;
        }
        .search-wrapper input[type="text"] {
            flex: 1;
            padding: 14px 18px 14px 46px;
            border: 2px solid transparent;
            border-radius: 14px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            color: #f1f5f9;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-wrapper input[type="text"]::placeholder { color: #64748b; }
        .search-wrapper input[type="text"]:focus {
            border-color: #818cf8;
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.25);
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
            pointer-events: none;
        }
        .search-wrapper button {
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
        }
        .search-wrapper button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }
        .search-wrapper button:active { transform: translateY(0); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Navigation */
        .nav-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            animation: fadeIn 0.9s ease-out;
        }
        .nav-actions a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 12px;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(99, 102, 241, 0.25);
            transition: all 0.3s;
        }
        .nav-actions a:hover {
            background: rgba(99, 102, 241, 0.3);
            color: #c7d2fe;
            transform: translateY(-2px);
        }

        /* Results */
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .result-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 22px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.12);
            border-radius: 16px;
            text-decoration: none;
            color: #e2e8f0;
            transition: all 0.3s ease;
            animation: cardSlideIn 0.5s ease-out both;
        }
        .result-card:nth-child(1) { animation-delay: 0.05s; }
        .result-card:nth-child(2) { animation-delay: 0.10s; }
        .result-card:nth-child(3) { animation-delay: 0.15s; }
        .result-card:nth-child(4) { animation-delay: 0.20s; }
        .result-card:nth-child(5) { animation-delay: 0.25s; }
        .result-card:nth-child(6) { animation-delay: 0.30s; }

        .result-card:hover {
            border-color: #818cf8;
            background: rgba(30, 41, 59, 0.95);
            transform: translateX(6px);
            box-shadow: 0 4px 24px rgba(99, 102, 241, 0.18);
        }

        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .result-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .result-info { flex: 1; }
        .result-info .title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 3px;
        }
        .result-info .meta {
            font-size: 0.82rem;
            color: #94a3b8;
        }
        .result-arrow {
            color: #475569;
            font-size: 1.2rem;
            transition: color 0.3s, transform 0.3s;
        }
        .result-card:hover .result-arrow {
            color: #818cf8;
            transform: translateX(4px);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.6s ease-out;
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state p {
            color: #64748b;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>

<div class="bg-particles">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
</div>

<div class="container">
    <div class="header">
        <h1>&#128269; Buscar Conversaciones</h1>
        <p>Encuentra cualquier conversación por palabra clave</p>
    </div>

    <div class="search-wrapper">
        <form method="GET">
            <span class="search-icon">&#128270;</span>
            <input type="text" name="q" placeholder="Escribe para buscar..." value="{{ query|default:'' }}" autocomplete="off">
            <button type="submit">Buscar</button>
        </form>
    </div>

    <div class="nav-actions">
        <a href="{% url 'chat' %}">&#128172; Nueva conversación</a>
        <a href="{% url 'buscar_conversaciones' %}">&#128196; Ver todas</a>
    </div>

    <div class="results-list">
        {% for sesion in sesiones %}
            <a href="{% url 'chat_con_id' sesion.id_sesion %}" class="result-card">
                <div class="result-icon">&#128488;</div>
                <div class="result-info">
                    <div class="title">Conversación #{{ sesion.id_sesion }}</div>
                    <div class="meta">{{ sesion.fecha_inicio }}</div>
                </div>
                <div class="result-arrow">&#10140;</div>
            </a>
        {% empty %}
            <div class="empty-state">
                <div class="icon">&#128173;</div>
                <p>No se encontraron conversaciones.</p>
            </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
